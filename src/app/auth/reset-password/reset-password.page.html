<ion-content class="auth-content">
  <div class="auth-center">
    <div class="auth-wrap">
      <img src="assets/logo/rooster-logo.png" alt="Rooster logo" class="logo logo--lg" />
      <h1 class="brand">Rooster</h1>

      <!-- Enlace inválido (sin token/email) -->
      <div *ngIf="!enlaceValido" class="bad">
        <div class="bad__icon"><ion-icon name="alert-circle-outline"></ion-icon></div>
        <p class="ok__title">Enlace inválido</p>
        <p class="hint">Este enlace de restablecimiento no es válido o está incompleto. Solicitá uno nuevo.</p>
      </div>

      <!-- Formulario de nueva contraseña -->
      <ng-container *ngIf="enlaceValido">
        <p class="tagline">Nueva contraseña</p>
        <p class="hint">Elegí una contraseña de 12+ caracteres con mayúscula, minúscula, número y símbolo.</p>

        <form [formGroup]="form" (ngSubmit)="restablecer()" class="auth-form">
          <div class="field">
            <label class="field__label">Nueva contraseña</label>
            <div class="input">
              <ion-icon name="lock-closed-outline"></ion-icon>
              <input [type]="showPass ? 'text' : 'password'" formControlName="password" placeholder="••••••••••••" autocomplete="new-password" />
              <button type="button" class="eye" (click)="showPass = !showPass">
                <ion-icon [name]="showPass ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
          </div>

          <div class="field">
            <label class="field__label">Confirmar contraseña</label>
            <div class="input">
              <ion-icon name="lock-closed-outline"></ion-icon>
              <input type="password" formControlName="password_confirmation" placeholder="••••••••••••" autocomplete="new-password" />
            </div>
          </div>

          <button type="submit" class="btn btn--primary" [disabled]="cargando">
            <ng-container *ngIf="!cargando">Restablecer contraseña</ng-container>
            <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
          </button>
        </form>
      </ng-container>

      <div class="switch">
        <a class="link link--bold" (click)="volver()">← Volver al inicio de sesión</a>
      </div>
    </div>
  </div>
</ion-content>
