<ion-content class="auth-content">
  <div class="auth-center">
    <div class="auth-wrap">
      <img src="assets/logo/rooster-logo.png" alt="Rooster logo" class="logo logo--lg" />
      <h1 class="brand">Rooster</h1>

      <ng-container *ngIf="!enviado">
        <p class="tagline">Restablecer contraseña</p>
        <p class="hint">Escribí tu correo y te enviaremos un enlace para elegir una nueva contraseña.</p>

        <form [formGroup]="form" (ngSubmit)="enviar()" class="auth-form">
          <div class="field">
            <label class="field__label">Correo electrónico</label>
            <div class="input">
              <ion-icon name="mail-outline"></ion-icon>
              <input type="email" formControlName="email" placeholder="ejemplo@correo.com" autocomplete="email" />
            </div>
          </div>

          <button type="submit" class="btn btn--primary" [disabled]="cargando">
            <ng-container *ngIf="!cargando">Enviar enlace <ion-icon name="paper-plane-outline"></ion-icon></ng-container>
            <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
          </button>
        </form>
      </ng-container>

      <div *ngIf="enviado" class="ok">
        <div class="ok__icon"><ion-icon name="mail-open-outline"></ion-icon></div>
        <p class="ok__title">Revisá tu correo</p>
        <p class="hint">
          Si el correo está registrado, te enviamos un enlace para restablecer tu contraseña.
          Revisá también la carpeta de <b>spam</b>.
        </p>
      </div>

      <div class="switch">
        <a class="link link--bold" (click)="volver()">← Volver al inicio de sesión</a>
      </div>
    </div>
  </div>
</ion-content>
