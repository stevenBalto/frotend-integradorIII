<ion-content class="auth-content">
  <div class="auth-center">
    <div class="auth-wrap">
      <div class="lock"><ion-icon name="lock-closed-outline"></ion-icon></div>
      <h1 class="brand">Cambiá tu contraseña</h1>
      <p class="hint">
        Estás usando una contraseña <b>temporal</b>. Por seguridad, tenés que elegir una nueva
        antes de continuar.
      </p>

      <form [formGroup]="form" (ngSubmit)="cambiar()" class="auth-form">
        <div class="field">
          <label class="field__label">Contraseña actual (temporal)</label>
          <div class="input">
            <ion-icon name="key-outline"></ion-icon>
            <input [type]="showActual ? 'text' : 'password'" formControlName="password_actual" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="eye" (click)="showActual = !showActual">
              <ion-icon [name]="showActual ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <div class="field">
          <label class="field__label">Nueva contraseña (12+, mayús/minús/número/símbolo)</label>
          <div class="input">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input [type]="showNueva ? 'text' : 'password'" formControlName="password" placeholder="••••••••••••" autocomplete="new-password" />
            <button type="button" class="eye" (click)="showNueva = !showNueva">
              <ion-icon [name]="showNueva ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <div class="field">
          <label class="field__label">Confirmar nueva contraseña</label>
          <div class="input">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" formControlName="password_confirmation" placeholder="••••••••••••" autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn btn--primary" [disabled]="cargando">
          <ng-container *ngIf="!cargando">Guardar y continuar</ng-container>
          <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
        </button>
      </form>

      <div class="switch">
        <a class="link" (click)="salir()">Cerrar sesión</a>
      </div>
    </div>
  </div>
</ion-content>
